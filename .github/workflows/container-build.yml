name: Build Multiarch Container Images
# inspired by https://docs.docker.com/build/ci/github-actions/multi-platform/
on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
   branches: [ main ]

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  REGISTRY_GH: ghcr.io

jobs:
  # ── Release Please ─────────────────────────────────────────────────────────
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    # Only meaningful on push events; skip on PRs
    if: github.event_name == 'push'
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          release-type: "rust"
          token: ${{ secrets.RP_PAT }}
          config-file: .release-please-config.json

  # ── Native amd64 build ─────────────────────────────────────────────────────
  build-amd64:
    name: build (linux/amd64)
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY_GH }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest (amd64)
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64
          push: true
          outputs: type=image,name=${{ env.REGISTRY_GH }}/${{ github.repository }},push-by-digest=true,name-canonical=true
          cache-from: type=registry,ref=${{ env.REGISTRY_GH }}/${{ github.repository }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY_GH }}/${{ github.repository }}:buildcache-amd64,mode=max,ignore-error=true

  # ── Native arm64 build ─────────────────────────────────────────────────────
  build-arm64:
    name: build (linux/arm64)
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY_GH }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest (arm64)
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ./Containerfile
          platforms: linux/arm64
          push: true
          outputs: type=image,name=${{ env.REGISTRY_GH }}/${{ github.repository }},push-by-digest=true,name-canonical=true
          cache-from: type=registry,ref=${{ env.REGISTRY_GH }}/${{ github.repository }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY_GH }}/${{ github.repository }}:buildcache-arm64,mode=max,ignore-error=true

  # ── Merge multi-arch manifest ──────────────────────────────────────────────
  merge:
    name: merge multi-arch manifest
    runs-on: ubuntu-latest
    needs: [ build-amd64, build-arm64 ]
    steps:
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ${{ env.REGISTRY_GH }}/${{ github.repository }}
          tags: |
            type=schedule,pattern=nightly,enable=true,priority=1000
            type=ref,event=branch,enable=true,priority=600
            type=ref,event=tag,enable=true,priority=600
            type=ref,event=pr,prefix=pr-,enable=true,priority=600
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }},priority=600

      - name: Login to ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY_GH }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${{ env.REGISTRY_GH }}/${{ github.repository }}@${{ needs.build-amd64.outputs.digest }} \
            ${{ env.REGISTRY_GH }}/${{ github.repository }}@${{ needs.build-arm64.outputs.digest }}

      - name: Inspect final manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY_GH }}/${{ github.repository }}:${{ steps.meta.outputs.version }}
